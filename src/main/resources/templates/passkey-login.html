<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passkey Login - Demo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #5568d3; }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .alert-error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .alert-info { background: #e7f3ff; color: #0066cc; border: 1px solid #b3d9ff; }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .fingerprint-icon {
            text-align: center;
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="fingerprint-icon">🔐</div>
        <h1>Đăng Nhập Passkey</h1>
        <p class="subtitle">Đăng nhập bằng sinh trắc học</p>
        
        <div id="message"></div>
        
        <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập" required autofocus>
        </div>
        
        <button id="loginBtn" class="btn">Đăng nhập bằng Passkey</button>
        
        <div class="link">
            <a th:href="@{/login}">Đăng nhập bằng mật khẩu</a>
        </div>
    </div>
    
    <script>
        // Check if WebAuthn is supported
        if (!window.PublicKeyCredential) {
            showMessage('Passkeys are not supported on this browser', 'error');
            document.getElementById('loginBtn').disabled = true;
        }
        
        // Login with passkey
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            
            if (!username) {
                showMessage('Please enter your username', 'error');
                return;
            }
            
            try {
                document.getElementById('loginBtn').disabled = true;
                showMessage('Authenticating...', 'info');
                
                // Start authentication
                const startResponse = await fetch(`/api/passkey/authenticate/start?username=${encodeURIComponent(username)}`, {
                    method: 'POST'
                });
                
                if (!startResponse.ok) {
                    const error = await startResponse.json();
                    throw new Error(error.message || 'Failed to start authentication');
                }
                
                const options = await startResponse.json();
                
                // Convert challenge and credential IDs
                const publicKeyOptions = {
                    challenge: base64ToUint8Array(options.challenge),
                    timeout: options.timeout,
                    rpId: options.rpId,
                    allowCredentials: options.allowCredentials.map(cred => ({
                        type: cred.type,
                        id: base64ToUint8Array(cred.id)
                    })),
                    userVerification: options.userVerification
                };
                
                // Get credential
                const assertion = await navigator.credentials.get({
                    publicKey: publicKeyOptions
                });
                
                // Finish authentication
                const finishResponse = await fetch(`/api/passkey/authenticate/finish?username=${encodeURIComponent(username)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        credentialId: uint8ArrayToBase64(new Uint8Array(assertion.rawId)),
                        authenticatorData: uint8ArrayToBase64(new Uint8Array(assertion.response.authenticatorData)),
                        clientDataJSON: uint8ArrayToBase64(new Uint8Array(assertion.response.clientDataJSON)),
                        signature: uint8ArrayToBase64(new Uint8Array(assertion.response.signature)),
                        userHandle: assertion.response.userHandle ? uint8ArrayToBase64(new Uint8Array(assertion.response.userHandle)) : null
                    })
                });
                
                if (!finishResponse.ok) {
                    throw new Error('Authentication failed');
                }
                
                const result = await finishResponse.json();
                
                // Session is now created, redirect to home
                showMessage('Login successful! Redirecting...', 'info');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
                
            } catch (error) {
                console.error('Authentication error:', error);
                showMessage('Authentication failed: ' + error.message, 'error');
            } finally {
                document.getElementById('loginBtn').disabled = false;
            }
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `alert alert-${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
        }
        
        function base64ToUint8Array(base64) {
            const binary = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        }
        
        function uint8ArrayToBase64(uint8Array) {
            let binary = '';
            for (let i = 0; i < uint8Array.length; i++) {
                binary += String.fromCharCode(uint8Array[i]);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }
    </script>
</body>
</html>
