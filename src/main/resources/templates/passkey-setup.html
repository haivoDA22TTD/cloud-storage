<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Passkey - Demo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .info-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .info-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .info-box ul {
            margin-left: 20px;
            color: #555;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover { background: #5568d3; }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6c757d;
            margin-top: 10px;
        }
        .btn-secondary:hover { background: #5a6268; }
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .alert-success { background: #efe; color: #3c3; border: 1px solid #cfc; }
        .alert-error { background: #fee; color: #c33; border: 1px solid #fcc; }
        .alert-info { background: #e7f3ff; color: #0066cc; border: 1px solid #b3d9ff; }
        .passkey-list {
            margin-top: 30px;
        }
        .passkey-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .passkey-info h4 {
            margin-bottom: 5px;
            color: #333;
        }
        .passkey-info p {
            font-size: 12px;
            color: #666;
        }
        .btn-delete {
            padding: 8px 16px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-delete:hover { background: #d32f2f; }
        .loading {
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Setup Passkey</h1>
        <p class="subtitle">Secure your account with biometric authentication</p>
        
        <div id="message"></div>
        
        <div class="info-box">
            <h3>Passkey là gì?</h3>
            <ul>
                <li>Đăng nhập bằng vân tay, khuôn mặt hoặc PIN</li>
                <li>An toàn hơn mật khẩu truyền thống</li>
                <li>Chỉ hoạt động trên thiết bị của bạn</li>
                <li>Không cần nhớ mật khẩu</li>
            </ul>
        </div>
        
        <div class="form-group">
            <label for="credentialName">Tên Passkey</label>
            <input type="text" id="credentialName" placeholder="VD: Laptop của tôi, iPhone" required>
        </div>
        
        <button id="registerBtn" class="btn">Tạo Passkey</button>
        <button onclick="window.location.href='/'" class="btn btn-secondary">Quay lại Trang chủ</button>
        
        <div class="passkey-list">
            <h3>Passkey của bạn</h3>
            <div id="passkeysList">
                <div class="loading">Đang tải...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Check if WebAuthn is supported
        if (!window.PublicKeyCredential) {
            showMessage('Passkeys are not supported on this browser', 'error');
            document.getElementById('registerBtn').disabled = true;
        }
        
        // Load existing passkeys
        loadPasskeys();
        
        // Register passkey
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const credentialName = document.getElementById('credentialName').value.trim();
            
            if (!credentialName) {
                showMessage('Please enter a name for your passkey', 'error');
                return;
            }
            
            try {
                document.getElementById('registerBtn').disabled = true;
                showMessage('Starting registration...', 'info');
                
                // Start registration
                const startResponse = await fetch('/api/passkey/register/start', {
                    method: 'POST'
                });
                
                if (!startResponse.ok) {
                    throw new Error('Failed to start registration');
                }
                
                const options = await startResponse.json();
                
                // Convert challenge to Uint8Array
                const publicKeyOptions = {
                    challenge: base64ToUint8Array(options.challenge),
                    rp: options.rp,
                    user: {
                        id: base64ToUint8Array(options.user.id),
                        name: options.user.name,
                        displayName: options.user.displayName
                    },
                    pubKeyCredParams: options.pubKeyCredParams,
                    timeout: options.timeout,
                    attestation: options.attestation,
                    authenticatorSelection: options.authenticatorSelection
                };
                
                // Create credential
                const credential = await navigator.credentials.create({
                    publicKey: publicKeyOptions
                });
                
                // Finish registration
                const finishResponse = await fetch('/api/passkey/register/finish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        credentialName: credentialName,
                        credentialId: uint8ArrayToBase64(new Uint8Array(credential.rawId)),
                        publicKey: uint8ArrayToBase64(new Uint8Array(credential.response.getPublicKey())),
                        attestationObject: uint8ArrayToBase64(new Uint8Array(credential.response.attestationObject)),
                        clientDataJSON: uint8ArrayToBase64(new Uint8Array(credential.response.clientDataJSON))
                    })
                });
                
                if (!finishResponse.ok) {
                    throw new Error('Failed to finish registration');
                }
                
                showMessage('Passkey created successfully!', 'success');
                document.getElementById('credentialName').value = '';
                loadPasskeys();
                
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('Failed to create passkey: ' + error.message, 'error');
            } finally {
                document.getElementById('registerBtn').disabled = false;
            }
        });
        
        async function loadPasskeys() {
            try {
                const response = await fetch('/api/passkey');
                const passkeys = await response.json();
                
                const container = document.getElementById('passkeysList');
                
                if (passkeys.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #666;">No passkeys registered yet</p>';
                    return;
                }
                
                container.innerHTML = passkeys.map(pk => `
                    <div class="passkey-item">
                        <div class="passkey-info">
                            <h4>${escapeHtml(pk.credentialName)}</h4>
                            <p>Created: ${new Date(pk.createdAt).toLocaleString()}</p>
                            ${pk.lastUsedAt ? `<p>Last used: ${new Date(pk.lastUsedAt).toLocaleString()}</p>` : ''}
                        </div>
                        <button class="btn-delete" onclick="deletePasskey(${pk.id})">Delete</button>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Failed to load passkeys:', error);
            }
        }
        
        async function deletePasskey(id) {
            if (!confirm('Are you sure you want to delete this passkey?')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/passkey/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showMessage('Passkey deleted successfully', 'success');
                    loadPasskeys();
                } else {
                    throw new Error('Failed to delete passkey');
                }
            } catch (error) {
                showMessage('Failed to delete passkey: ' + error.message, 'error');
            }
        }
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `alert alert-${type}`;
            messageDiv.textContent = text;
            messageDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }
        
        function base64ToUint8Array(base64) {
            const binary = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) {
                bytes[i] = binary.charCodeAt(i);
            }
            return bytes;
        }
        
        function uint8ArrayToBase64(uint8Array) {
            let binary = '';
            for (let i = 0; i < uint8Array.length; i++) {
                binary += String.fromCharCode(uint8Array[i]);
            }
            return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
